<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<h2>Register</h2>

<form id="registerForm">
    <input type="email" id="email" name="email" placeholder="Email" required>
    <input type="password" id="password" name="password" placeholder="Password" required>
    <button type="submit">Register</button>
</form>

<p id="success-message"></p>
<p id="error-message"></p>

<script>
const form = document.getElementById('registerForm');
form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const successMessage = document.getElementById('success-message');
    const errorMessage = document.getElementById('error-message');

    successMessage.textContent = '';
    errorMessage.textContent = '';

    try {
        const res = await fetch('/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.message) {
            successMessage.textContent = data.message;
        } else {
            // Normalize backend error for Playwright
            if (typeof data.detail === 'string') {
                errorMessage.textContent = data.detail;
            } else if (Array.isArray(data.errors)) {
                // Use our custom validation handler message
                errorMessage.textContent = 'Error during registration';
            } else {
                errorMessage.textContent = 'Error during registration';
            }
        }
    } catch (err) {
        errorMessage.textContent = 'Network error: ' + err.message;
    }
});
</script>

</body>
</html>
